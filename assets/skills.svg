<svg width="850" height="280" viewBox="0 0 850 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tech stack">
  <!--
    TECH STACK SECTION — styled to match header.svg.
    Categories & items are pulled from the resume's TECHNICAL SKILLS.
    Edit pills by changing the <g class="pill"> text + rect widths.
  -->
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="850" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08080c"/>
      <stop offset="1" stop-color="#0e0b1a"/>
    </linearGradient>

    <linearGradient id="saccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa">
        <animate attributeName="stop-color"
          values="#a78bfa;#60a5fa;#22d3ee;#a78bfa" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#22d3ee">
        <animate attributeName="stop-color"
          values="#22d3ee;#a78bfa;#60a5fa;#22d3ee" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="sglow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sglow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <filter id="ssoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>

    <style>
      .title { font: 700 22px 'IM Fell Great Primer SC', Georgia, 'Times New Roman', serif; }
      .cat   { font: 700 13px 'Segoe UI', system-ui, -apple-system, sans-serif; letter-spacing:2px; fill:#8b8fa3; text-transform:uppercase; }
      .pill  { font: 600 13px 'Segoe UI', system-ui, -apple-system, sans-serif; fill:#e6e7ee; }
      .pbox  { fill:#a78bfa; fill-opacity:0.10; stroke:#a78bfa; stroke-opacity:0.35; }
    </style>
  </defs>

  <!-- Base -->
  <rect width="850" height="280" rx="18" fill="url(#sbg)"/>
  <rect width="849" height="279" x="0.5" y="0.5" rx="17.5" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- Floating glow blobs -->
  <g filter="url(#ssoft)">
    <circle cx="140" cy="60" r="90" fill="url(#sglow1)">
      <animate attributeName="cy" values="60;95;60" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="710" cy="220" r="100" fill="url(#sglow2)">
      <animate attributeName="cy" values="220;185;220" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Title -->
  <text class="title" x="30" y="42" fill="url(#saccent)">Tech Stack</text>

  <!-- ===== LANGUAGES ===== -->
  <text class="cat" x="30" y="82">LANGUAGES</text>
  <g transform="translate(0,92)">
    <g class="lang"><rect class="pbox" x="30"  y="0" width="56"  height="26" rx="13"/><text class="pill" x="58"  y="17" text-anchor="middle">Java</text></g>
    <g class="lang"><rect class="pbox" x="96"  y="0" width="63"  height="26" rx="13"/><text class="pill" x="127" y="17" text-anchor="middle">C/C++</text></g>
    <g class="lang"><rect class="pbox" x="169" y="0" width="70"  height="26" rx="13"/><text class="pill" x="204" y="17" text-anchor="middle">Python</text></g>
    <g class="lang"><rect class="pbox" x="249" y="0" width="63"  height="26" rx="13"/><text class="pill" x="280" y="17" text-anchor="middle">OCaml</text></g>
    <g class="lang"><rect class="pbox" x="322" y="0" width="49"  height="26" rx="13"/><text class="pill" x="346" y="17" text-anchor="middle">PHP</text></g>
    <g class="lang"><rect class="pbox" x="381" y="0" width="63"  height="26" rx="13"/><text class="pill" x="412" y="17" text-anchor="middle">MySQL</text></g>
    <g class="lang"><rect class="pbox" x="454" y="0" width="98"  height="26" rx="13"/><text class="pill" x="503" y="17" text-anchor="middle">JavaScript</text></g>
    <g class="lang"><rect class="pbox" x="562" y="0" width="56"  height="26" rx="13"/><text class="pill" x="590" y="17" text-anchor="middle">HTML</text></g>
  </g>

  <!-- ===== FRAMEWORKS ===== -->
  <text class="cat" x="30" y="148">FRAMEWORKS</text>
  <g transform="translate(0,158)">
    <g class="fw"><rect class="pbox" x="30"  y="0" width="63"  height="26" rx="13"/><text class="pill" x="61"  y="17" text-anchor="middle">React</text></g>
    <g class="fw"><rect class="pbox" x="103" y="0" width="112" height="26" rx="13"/><text class="pill" x="159" y="17" text-anchor="middle">Tailwind CSS</text></g>
    <g class="fw"><rect class="pbox" x="225" y="0" width="70"  height="26" rx="13"/><text class="pill" x="260" y="17" text-anchor="middle">Docker</text></g>
    <g class="fw"><rect class="pbox" x="305" y="0" width="77"  height="26" rx="13"/><text class="pill" x="343" y="17" text-anchor="middle">MongoDB</text></g>
    <g class="fw"><rect class="pbox" x="392" y="0" width="98"  height="26" rx="13"/><text class="pill" x="441" y="17" text-anchor="middle">WebSockets</text></g>
    <g class="fw"><rect class="pbox" x="500" y="0" width="70"  height="26" rx="13"/><text class="pill" x="535" y="17" text-anchor="middle">Apache</text></g>
    <g class="fw"><rect class="pbox" x="580" y="0" width="119" height="26" rx="13"/><text class="pill" x="639" y="17" text-anchor="middle">Web Audio API</text></g>
  </g>

  <!-- ===== TOOLS ===== -->
  <text class="cat" x="30" y="214">TOOLS</text>
  <g transform="translate(0,224)">
    <g class="tool"><rect class="pbox" x="30"  y="0" width="49"  height="26" rx="13"/><text class="pill" x="54"  y="17" text-anchor="middle">Git</text></g>
    <g class="tool"><rect class="pbox" x="89"  y="0" width="77"  height="26" rx="13"/><text class="pill" x="127" y="17" text-anchor="middle">VS Code</text></g>
    <g class="tool"><rect class="pbox" x="176" y="0" width="84"  height="26" rx="13"/><text class="pill" x="218" y="17" text-anchor="middle">IntelliJ</text></g>
    <g class="tool"><rect class="pbox" x="270" y="0" width="98"  height="26" rx="13"/><text class="pill" x="319" y="17" text-anchor="middle">Linux/Unix</text></g>
    <g class="tool"><rect class="pbox" x="378" y="0" width="70"  height="26" rx="13"/><text class="pill" x="413" y="17" text-anchor="middle">FFmpeg</text></g>
    <g class="tool"><rect class="pbox" x="458" y="0" width="63"  height="26" rx="13"/><text class="pill" x="489" y="17" text-anchor="middle">Nginx</text></g>
  </g>
</svg>
